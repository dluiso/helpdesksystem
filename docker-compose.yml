services:
  postgres:
    image: postgres:16-alpine
    container_name: avidity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avidity_it_management}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: avidity-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: avidity-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: avidity-api
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Avidity IT Management Tool}
      APP_ENV: ${APP_ENV:-development}
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:4000}
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/avidity_it_management}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-to-a-long-random-value}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-avidity_session}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-12}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      MICROSOFT_SUPPORT_MAILBOX: ${MICROSOFT_SUPPORT_MAILBOX:-support@aviditytechnologies.com}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_MODEL: ${AI_MODEL:-mock}
      FILE_STORAGE_PROVIDER: ${FILE_STORAGE_PROVIDER:-local}
      LOCAL_STORAGE_PATH: /app/storage/local
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-25}
      DEFAULT_COMPANY_NAME: ${DEFAULT_COMPANY_NAME:-Avidity Technologies}
      DEFAULT_SUPPORT_EMAIL: ${DEFAULT_SUPPORT_EMAIL:-support@aviditytechnologies.com}
    ports:
      - "4000:4000"
    volumes:
      - ./storage/local:/app/storage/local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    profiles: ["app"]
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: avidity-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
